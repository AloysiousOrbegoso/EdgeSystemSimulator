# Prometheus configuration for the testbed.
#
# Scrapes the scheduler's /metrics and each edge node's /metrics. The
# job names show up as Prometheus labels and make queries readable.

global:
  scrape_interval: 5s
  evaluation_interval: 10s

scrape_configs:
  - job_name: scheduler
    static_configs:
      - targets: ["scheduler:8000"]

  - job_name: edge_nodes
    static_configs:
      - targets:
          - "edge1:5000"
          - "edge2:5000"
          - "edge3:5000"
          - "edge4:5000"